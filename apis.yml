aid: udemy
name: Udemy
description: Udemy is a global online learning marketplace offering tens of thousands
  of on-demand video courses across business, technology, design, and personal development,
  alongside Udemy Business, an enterprise learning subscription for workforce skills
  development. Udemy exposes REST APIs including the Affiliate API for course discovery
  and the Instructor API for instructor resources, both using bearer token authentication
  over HTTPS with JSON-formatted responses.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Online Learning
- E-Learning
- Education
- Courses
- Corporate Training
- Workforce Development
