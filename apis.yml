created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
- aid: udemy:affiliate-api
  name: Udemy Affiliate API
  description: REST Affiliate API exposing the Udemy course catalog for course discovery
    and search by category, subcategory, price, language, and keyword. Authentication
    uses a base64-encoded HTTP Basic header derived from a client ID and client secret.
    Note Udemy discontinued new Affiliate API access on 2025-01-01; existing approved
    clients retain access.
  humanURL: https://www.udemy.com/developers/affiliate/
  baseURL: https://www.udemy.com/api-2.0
  tags:
  - Courses
  - Course Catalog
  - Search
  - Affiliate
  properties:
  - type: Documentation
    url: https://www.udemy.com/developers/affiliate/
  - type: Course Model
    url: https://www.udemy.com/developers/affiliate/models/course/
  - url: graphql/udemy-graphql.md
    type: GraphQL
- aid: udemy:instructor-api
  name: Udemy Instructor API
  description: REST Instructor API providing programmatic access to instructor-owned
    courses, students, revenue reports, and course resources. Authentication uses
    bearer tokens scoped to instructor accounts.
  humanURL: https://www.udemy.com/developers/instructor/
  baseURL: https://www.udemy.com/instructor-api/v1
  tags:
  - Instructor
  - Courses
  - Revenue Reports
  - Students
  properties:
  - type: Documentation
    url: https://www.udemy.com/developers/instructor/
- aid: udemy:business-api
  name: Udemy Business API
  description: REST API for Udemy Business customers to programmatically manage users,
    groups, course assignments, learning activity, and reporting for their enterprise
    learning environment.
  humanURL: https://www.postman.com/udemy-inc-429715/udemy-business-web-apis/documentation/loj22uj/udemy-business-apis
  baseURL: https://{subdomain}.udemy.com/api-2.0
  tags:
  - Corporate Training
  - Learning Management
  - User Management
  - Reporting
  properties:
  - type: Documentation
    url: https://www.postman.com/udemy-inc-429715/udemy-business-web-apis/documentation/loj22uj/udemy-business-apis
  - type: PDF Reference
    url: https://s3.amazonaws.com/udemy-images/support/Udemy_for_Business_API_Reference_v2.0.pdf
